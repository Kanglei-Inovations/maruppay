  # UI & Animations
  flutter_animate: ^4.5.0
  lottie: ^3.0.0
  rive: ^0.12.4
  shimmer: ^3.0.0
  fl_chart: ^0.66.0
  responsive_framework: ^1.1.1
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
